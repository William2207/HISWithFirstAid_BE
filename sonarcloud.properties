sonar.projectKey=William2207_FirstAid_BE
sonar.organization=william2207

# Project settings
sonar.projectName=FirstAid API
sonar.projectVersion=1.0.0

# Paths
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*Tests.cs,**/*Test.cs

# Code coverage
sonar.cs.opencover.reportsPaths=coverage.opencover.xml
sonar.coverage.exclusions=**/*Tests.cs,**/Migrations/**,**/obj/**,**/bin/**

# Exclude files
sonar.exclusions=**/Migrations/**,**/obj/**,**/bin/**,**/*.Test.cs,**/*Tests.cs

# .NET specific
sonar.dotnet.excludeGeneratedCode=true

# Quality gates
sonar.qualitygate.wait=true
